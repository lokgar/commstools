name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync environment (core + dev)
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy commstools/

      - name: Run tests (CPU) with coverage
        run: uv run pytest --device=cpu --cov=commstools --cov-report=term-missing

# GPU legs (--device=gpu / --device=all) require CuPy + CUDA and are run
# manually or on a self-hosted runner; they are intentionally not part of
# this hosted CPU workflow.
