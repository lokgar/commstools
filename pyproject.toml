[project]
name = "commstools"
version = "1.5.2"
description = "A Python library for high-performance digital communications research."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jupyter>=1.1.1",
    "matplotlib>=3.10.1",
    "numpy>=2.2.4",
    "pandas>=2.2.3",
    "pyyaml>=6.0.2",
    "scipy>=1.15.2",
    "sympy>=1.13.3",
    "pydantic>=2.0.0",
    "mypy>=1.19.0",
    "jax[cuda13]>=0.8.1",
    "cupy-cuda13x>=13.6.0",
    "nvidia-curand>=10.4.1.34",
    "numba>=0.64.0",
]

[dependency-groups]
dev = [
    "bump-my-version>=1.2.7",
    "pytest>=8.3.5",
    "pytest-cov>=7.0.0",
]

[tool.setuptools]
packages = ["commstools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--device=all"
filterwarnings = [
    "ignore::FutureWarning:cupyx",
]
markers = [
    "gpu: marks tests as requiring a GPU (skipped automatically when CuPy is unavailable)",
]

[tool.bumpversion]
current_version = "1.5.2"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
search = "{current_version}"
replace = "{new_version}"
regex = false
ignore_missing_version = false
ignore_missing_files = false
tag = false
sign_tags = false
tag_name = "v{new_version}"
tag_message = "Bump version: {current_version} → {new_version}"
allow_dirty = true
commit = false
message = "Bump version: {current_version} → {new_version}"
moveable_tags = []
commit_args = ""
setup_hooks = []
pre_commit_hooks = []
post_commit_hooks = []
